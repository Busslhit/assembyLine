upscale|Refine the previous output with sophisticated vocabulary and professional tone.
summarize|Condense the output into a concise summary.
logic_check|Identify contradictions or logical gaps in the previous output.
add_detail|Expand the output with technical data and historical context.
critic|Review the previous output for gaps, assumptions, and vague statements. Do not rewrite yet; just list the problems.
red_team|Act as an adversary. Find three realistic scenarios where the previous model's logic or strategy would fail.
structured_evidence|Declare the variables and assumptions used in the previous step and provide a table of evidence for each claim.
thought_loop|Analyze the previous output. If it is incomplete, list what is missing. If complete, summarize the final stance.
persona_shift|Take the raw data from the previous model and rewrite it from the perspective of a Senior Expert in the relevant field.
cot_reasoning|Think step-by-step to explain how you are reaching your conclusion based on the data from the previous model.
